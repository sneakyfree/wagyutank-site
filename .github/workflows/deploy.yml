name: Deploy to Cloudflare Pages

# Push to main -> build the Next.js static export -> deploy out/ to CF Pages.
# Mirrors the rest of the fleet's auto-deploy so foundation-photo/content
# changes go live without a manual `wrangler pages deploy`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: "193b347aedeaafe35de0b5a534b2d9aa"
          command: pages deploy out --project-name=wagyutank --branch=main --commit-dirty=true
